<script src="assets/api.js"></script>
<script>
if (Auth.token()) {
  const r = Auth.role();
  if (r === "admin") window.location.href = "admin.html";
  else if (r === "coordinator") window.location.href = "coordinator.html";
  else if (r === "supervisor")  window.location.href = "supervisor.html";
}

(async () => {
  try {
    const s = await fetch(API_BASE + "/admin/settings/public").then(r => r.ok ? r.json() : {});
    document.getElementById("login-school-name").textContent = s.school_name || "Your School";
    document.getElementById("login-motto").textContent = s.school_motto || "";
    if (s.school_logo) document.getElementById("dyn-school-logo").src = s.school_logo;
  } catch(e) {
    document.getElementById("login-school-name").textContent = "Your School";
  }
})();

document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

async function doLogin() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const errEl    = document.getElementById("login-error");
  const btn      = document.getElementById("login-btn");
  errEl.style.display = "none";
  if (!username || !password) {
    errEl.textContent = "Please enter your username and password.";
    errEl.style.display = "block"; return;
  }
  btn.disabled = true; btn.textContent = "Signing in…";
  try {
    const data = await Api.post("/auth/login", { username, password });
    Auth.save(data.access_token, data.user);
    const role = data.user.role;
    if      (role === "admin")       window.location.href = "admin.html";
    else if (role === "coordinator") window.location.href = "coordinator.html";
    else if (role === "supervisor")  window.location.href = "supervisor.html";
    else { errEl.textContent = "Unknown role — contact admin."; errEl.style.display = "block"; }
  } catch(e) {
    errEl.textContent = e.message || "Login failed. Please try again.";
    errEl.style.display = "block";
  } finally {
    btn.disabled = false; btn.textContent = "Sign In";
  }
}
</script>
