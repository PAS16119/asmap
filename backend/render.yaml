services:
  - type: web
    name: asmap-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app('production')" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: asmap-db
          property: connectionString

databases:
  - name: asmap-db
    plan: free
